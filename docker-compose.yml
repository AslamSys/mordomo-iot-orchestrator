services:
  iot-orchestrator:
    build: .
    image: aslamsys/mordomo-iot-orchestrator:latest
    container_name: mordomo-iot-orchestrator
    restart: unless-stopped
    environment:
      NATS_URL:      nats://nats:4222
      MQTT_BROKER:   mqtt://mordomo-iot-mqtt-broker:1883
      MQTT_USER:     ${MQTT_USER:-orchestrator}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      REDIS_URL:     redis://redis:6379/2
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    networks:
      - mordomo-net
      - iot-net
    depends_on:
      - mordomo-iot-mqtt-broker
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 256M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  mordomo-net:
    external: true
  iot-net:
    external: true
